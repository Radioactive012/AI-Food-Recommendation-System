{% extends "base.html" %}

{% block title %}BiteWise - Sign Up{% endblock %}

{% block page_title %}Create Account{% endblock %}

{% block content %}
<div class="auth-container" style="min-height: auto; padding: 2rem 0;">
    <div class="auth-card glass-panel" style="max-width: 650px;">
        <div class="auth-header">
            <i class="fa-solid fa-user-plus"></i>
            <h2>Join BiteWise</h2>
            <p>Set up your profile to receive intelligent recommendations</p>
        </div>
        
        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-grid">
                <!-- Personal Info -->
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-input" placeholder="e.g. Rahul Sharma" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="e.g. rahul@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" class="form-input" placeholder="e.g. 25" min="1" max="120" required>
                </div>
                
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-input" required style="background-color: rgba(0, 0, 0, 0.2);">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Dietary Info -->
                <div class="form-group">
                    <label for="diet_type">Diet Type</label>
                    <select id="diet_type" name="diet_type" class="form-input" required style="background-color: rgba(0, 0, 0, 0.2);">
                        <option value="" disabled selected>Select Diet</option>
                        <option value="Veg">Vegetarian</option>
                        <option value="Non-Veg">Non-Vegetarian</option>
                        <option value="Vegan">Vegan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="spice_preference">Spice Preference</label>
                    <select id="spice_preference" name="spice_preference" class="form-input" required style="background-color: rgba(0, 0, 0, 0.2);">
                        <option value="" disabled selected>Select Spice Level</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="health_goal">Health Goal</label>
                    <select id="health_goal" name="health_goal" class="form-input" required style="background-color: rgba(0, 0, 0, 0.2);">
                        <option value="" disabled selected>Select Goal</option>
                        <option value="Weight Loss">Weight Loss (Low Calorie)</option>
                        <option value="Muscle Gain">Muscle Gain (High Protein)</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Healthy Eating">Healthy Eating</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <button type="submit" class="submit-btn">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Register & Profile Setup</span>
                    </button>
                </div>
            </div>
        </form>
        
        <div class="auth-footer-link">
            Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
